  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: von-webserver
      namespace: ssi-network
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: von-webserver
      template:
        metadata:
          labels:
            app: von-webserver
            network: von
        spec:
          containers:
            - name: webserver
              image: dn06/ssi:von-network-v1
              imagePullPolicy: IfNotPresent
              command: ["bash", "-c", "sleep 10 && ./scripts/start_webserver.sh"]
              env:
                - name: IP
                  value: "0.0.0.0"
                - name: IPS
                  value: "von-node-1,von-node-2,von-node-3,von-node-4"
                - name: RUST_LOG
                  value: "warning"
                - name: REGISTER_NEW_DIDS
                  value: "True"
                - name: LEDGER_INSTANCE_NAME
                  value: "SSI-Network-Dev"
                - name: LEDGER_SEED
                  value: "000000000000000000000000Trustee1"
              ports:
                - containerPort: 8000
              resources:
                requests: { cpu: "50m", memory: "128Mi" }
                limits:   { cpu: "250m", memory: "256Mi" }
          imagePullSecrets:
