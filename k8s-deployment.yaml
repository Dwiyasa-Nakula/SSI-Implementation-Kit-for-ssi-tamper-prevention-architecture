apiVersion: v1
kind: List
items:
  # --- NAMESPACE ---
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: ssi-network

  # --- SECRETS ---
  # IMPORTANT: PLEASE CHANGE THE KEYS/GENERATE NEW ONES BEFORE APPLYING
  # See k8s-secrets.template.yaml 

  # Allow DNS and specific egress
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: base-egress-policy
      namespace: ssi-network
    spec:
      podSelector: {}
      policyTypes: [Egress]
      egress:
        - to: # DNS
            - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } }
          ports:
            - protocol: UDP
              port: 53
            - protocol: TCP
              port: 53
        - to: # External Ledger/Web
            - ipBlock: { cidr: 0.0.0.0/0 }
          ports:
            - protocol: TCP
              port: 443
            - protocol: TCP
              port: 9000
        - to: # Internal DIDComm + VON (same namespace)
            - podSelector: {}
          ports:
            - protocol: TCP
              port: 8000
            - protocol: TCP
              port: 8020
            - protocol: TCP
              port: 8030
            - protocol: TCP
              port: 9701
            - protocol: TCP
              port: 9702
            - protocol: TCP
              port: 9703
            - protocol: TCP
              port: 9704
            - protocol: TCP
              port: 9705
            - protocol: TCP
              port: 9706
            - protocol: TCP
              port: 9707
            - protocol: TCP
              port: 9708

  # RESTRICTIVE POLICIES
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-gov-to-issuer
      namespace: ssi-network
    spec:
      podSelector: { matchLabels: { app: issuer-agent } }
      ingress:
        - from: [{ podSelector: { matchLabels: { app: governance-service } } }]
          ports: [{ port: 8001 }]

  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-didcomm-issuer
      namespace: ssi-network
    spec:
      podSelector: { matchLabels: { app: issuer-agent } }
      ingress:
        - from: 
            - podSelector: { matchLabels: { app: holder-agent } }
            - podSelector: { matchLabels: { app: verification-gateway } }
          ports: [{ port: 8000 }]

  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-didcomm-holder
      namespace: ssi-network
    spec:
      podSelector: { matchLabels: { app: holder-agent } }
      ingress:
        - from: 
            - podSelector: { matchLabels: { app: issuer-agent } }
            - podSelector: { matchLabels: { app: verification-gateway } }
          ports: [{ port: 8030 }]

  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-gateway-to-rekor
      namespace: ssi-network
    spec:
      podSelector: { matchLabels: { app: rekor-server } }
      ingress:
        - from: [{ podSelector: { matchLabels: { app: verification-gateway } } }]
          ports: [{ port: 3000 }]

  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-redis-access
      namespace: ssi-network
    spec:
      podSelector: { matchLabels: { app: redis-store } }
      ingress:
        - from: 
            - podSelector: { matchLabels: { app: governance-service } }
            - podSelector: { matchLabels: { app: verification-gateway } }
            - podSelector: { matchLabels: { app: accumulator-service } }
          ports: [{ port: 6379 }]

  # --- SHARED INFRASTRUCTURE (REDIS) ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: redis-store
      namespace: ssi-network
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: redis-store
      template:
        metadata:
          labels:
            app: redis-store
        spec:
          containers:
            - name: redis
              image: mirror.gcr.io/redis:7.2-alpine
              command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
              env:
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef: { name: ssi-secrets, key: REDIS_PASSWORD }
              imagePullPolicy: IfNotPresent
              ports: [{ containerPort: 6379 }]
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "250m"
                  memory: "256Mi"

  - apiVersion: v1
    kind: Service
    metadata:
      name: redis-store
      namespace: ssi-network
    spec:
      selector:
        app: redis-store
      ports: [{ port: 6379 }]

  # --- WALLET DATABASE (POSTGRES STATEFULSET) ---
  - apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: wallet-db
      namespace: ssi-network
    spec:
      serviceName: wallet-db
      replicas: 1
      selector:
        matchLabels:
          app: wallet-db
      template:
        metadata:
          labels:
            app: wallet-db
        spec:
          containers:
            - name: postgres
              image: mirror.gcr.io/postgres:15.17-alpine
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "2"
                  memory: "2Gi"
              env:
                - name: POSTGRES_USER
                  value: "indy"
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_DB
                  value: "wallets"
              ports:
                - containerPort: 5432
              volumeMounts:
                - name: db-data
                  mountPath: /var/lib/postgresql/data
      volumeClaimTemplates:
        - metadata:
            name: db-data
          spec:
            accessModes: ["ReadWriteOnce"]
            # Uses default StorageClass
            resources:
              requests:
                storage: 4Gi # 50Gi Storage produksi yang lebih besar

  - apiVersion: v1
    kind: Service
    metadata:
      name: wallet-db
      namespace: ssi-network
    spec:
      clusterIP: None
      selector:
        app: wallet-db
      ports:
        - port: 5432

  # Validator Public Keys ConfigMap
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: validator-keys
      namespace: ssi-network
    data:
      validator_1.pub: |
        -----BEGIN PUBLIC KEY-----
        MCowBQYDK2VwAyEA/WdbM+2xT5v3tE1qk6x7W2x3+7j7X9x8x3+7j7X9x8w=
        -----END PUBLIC KEY-----
      validator_2.pub: |
        -----BEGIN PUBLIC KEY-----
        MCowBQYDK2VwAyEA+9x8x3+7j7X9x8x3+7j7X9x8x3+7j7X9x8x3+7j7X9w=
        -----END PUBLIC KEY-----
      validator_3.pub: |
        -----BEGIN PUBLIC KEY-----
        MCowBQYDK2VwAyEA/WdbM+2xT5v3tE1qk6x7W2x3+7j7X9x8x3+7j7X9x8A=
        -----END PUBLIC KEY-----
      validator_4.pub: |
        -----BEGIN PUBLIC KEY-----
        MCowBQYDK2VwAyEA/WdbM+2xT5v3tE1qk6x7W2x3+7j7X9x8x3+7j7X9x8B=
        -----END PUBLIC KEY-----
      validator_5.pub: |
        -----BEGIN PUBLIC KEY-----
        MCowBQYDK2VwAyEA/WdbM+2xT5v3tE1qk6x7W2x3+7j7X9x8x3+7j7X9x8C=
        -----END PUBLIC KEY-----
  # ConfigMap Schema (SQL)
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: trillian-schema
      namespace: ssi-network
    data:
      storage.sql: |
        CREATE TABLE IF NOT EXISTS Trees (
          TreeId                BIGINT NOT NULL,
          TreeState             ENUM('ACTIVE', 'FROZEN', 'DRAINING') NOT NULL,
          TreeType              ENUM('LOG', 'MAP', 'PREORDERED_LOG') NOT NULL,
          HashStrategy          ENUM('RFC6962_SHA256') NOT NULL,
          HashAlgorithm         ENUM('SHA256') NOT NULL,
          SignatureAlgorithm    ENUM('ECDSA', 'RSA', 'ED25519') NOT NULL,
          DisplayName           VARCHAR(20),
          Description           VARCHAR(200),
          CreateTimeMillis      BIGINT NOT NULL,
          UpdateTimeMillis      BIGINT NOT NULL,
          MaxRootDurationMillis BIGINT NOT NULL,
          PrivateKey            MEDIUMBLOB NOT NULL,
          PublicKey             MEDIUMBLOB NOT NULL,
          Deleted               BOOLEAN,
          DeleteTimeMillis      BIGINT,
          PRIMARY KEY(TreeId)
        );
        CREATE TABLE IF NOT EXISTS TreeControl (
          TreeId                  BIGINT NOT NULL,
          SigningEnabled          BOOLEAN NOT NULL,
          SequencingEnabled       BOOLEAN NOT NULL,
          SequenceIntervalSeconds INTEGER NOT NULL,
          PRIMARY KEY(TreeId),
          FOREIGN KEY(TreeId) REFERENCES Trees(TreeId) ON DELETE CASCADE
        );
        CREATE TABLE IF NOT EXISTS Subtree (
          TreeId               BIGINT NOT NULL,
          SubtreeId            VARBINARY(255) NOT NULL,
          Nodes                MEDIUMBLOB NOT NULL,
          SubtreeRevision      INTEGER NOT NULL,
          PRIMARY KEY(TreeId, SubtreeId, SubtreeRevision),
          FOREIGN KEY(TreeId) REFERENCES Trees(TreeId) ON DELETE CASCADE
        );
        CREATE TABLE IF NOT EXISTS TreeHead (
          TreeId               BIGINT NOT NULL,
          TreeHeadTimestamp    BIGINT,
          TreeSize             BIGINT,
          RootHash             VARBINARY(255) NOT NULL,
          RootSignature        VARBINARY(1024) NOT NULL,
          TreeHeadRevision     BIGINT,
          PRIMARY KEY(TreeId, TreeHeadRevision),
          FOREIGN KEY(TreeId) REFERENCES Trees(TreeId) ON DELETE CASCADE
        );
        CREATE TABLE IF NOT EXISTS LeafData (
          TreeId               BIGINT NOT NULL,
          LeafIdentityHash     VARBINARY(255) NOT NULL,
          LeafValue            MEDIUMBLOB NOT NULL,
          ExtraData            MEDIUMBLOB,
          PRIMARY KEY(TreeId, LeafIdentityHash),
          FOREIGN KEY(TreeId) REFERENCES Trees(TreeId) ON DELETE CASCADE
        );
        CREATE TABLE IF NOT EXISTS SequencedLeafData (
          TreeId               BIGINT NOT NULL,
          SequenceNumber       BIGINT NOT NULL,
          LeafIdentityHash     VARBINARY(255) NOT NULL,
          Merklized            BOOLEAN,
          IntegrateTimestamp   BIGINT NOT NULL,
          PRIMARY KEY(TreeId, SequenceNumber),
          FOREIGN KEY(TreeId) REFERENCES Trees(TreeId) ON DELETE CASCADE,
          FOREIGN KEY(TreeId, LeafIdentityHash) REFERENCES LeafData(TreeId, LeafIdentityHash) ON DELETE CASCADE
        );
        CREATE TABLE IF NOT EXISTS Unsequenced (
          TreeId               BIGINT NOT NULL,
          Bucket               INTEGER NOT NULL,
          LeafIdentityHash     VARBINARY(255) NOT NULL,
          Merklized            BOOLEAN,
          QueueTimestampNanos  BIGINT NOT NULL,
          PRIMARY KEY(TreeId, Bucket, QueueTimestampNanos, LeafIdentityHash),
          FOREIGN KEY(TreeId) REFERENCES Trees(TreeId) ON DELETE CASCADE,
          FOREIGN KEY(TreeId, LeafIdentityHash) REFERENCES LeafData(TreeId, LeafIdentityHash) ON DELETE CASCADE
        );

  # Trillian Database (MySQL)
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: trillian-mysql
      namespace: ssi-network
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: trillian-mysql
      template:
        metadata:
          labels:
            app: trillian-mysql
        spec:
          containers:
            - name: mysql
              image: mirror.gcr.io/mysql:8.0.45
              imagePullPolicy: IfNotPresent
              args:
                - "--default-authentication-plugin=mysql_native_password"
              env:
                - name: MYSQL_ROOT_PASSWORD
                  value: "rootpass"
                - name: MYSQL_DATABASE
                  value: "test"
              ports: [{ containerPort: 3306 }]
              volumeMounts:
                - name: schema-volume
                  mountPath: /docker-entrypoint-initdb.d
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "2"
                  memory: "2Gi"
          volumes:
            - name: schema-volume
              configMap:
                name: trillian-schema

  - apiVersion: v1
    kind: Service
    metadata:
      name: trillian-mysql
      namespace: ssi-network
    spec:
      selector:
        app: trillian-mysql
      ports: [{ port: 3306 }]

  # Trillian Log Server (RPC)
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: trillian-log-server
      namespace: ssi-network
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: trillian-log-server
      template:
        metadata:
          labels:
            app: trillian-log-server
        spec:
          containers:
            - name: log-server
              image: ghcr.io/sigstore/rekor/trillian_log_server:v1.3.4
              command:
                - "/ko-app/trillian_log_server"
                - "--http_endpoint=0.0.0.0:8090"
                - "--rpc_endpoint=0.0.0.0:8091"
                - "--storage_system=mysql"
                - "--mysql_uri=root:rootpass@tcp(trillian-mysql:3306)/test"
                - "--alsologtostderr"
              ports:
                - containerPort: 8090
                - containerPort: 8091
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "2"
                  memory: "2Gi"
          initContainers:
            - name: wait-for-mysql
              image: mirror.gcr.io/busybox:1.36.1
              imagePullPolicy: IfNotPresent
              command:
                [
                  "sh",
                  "-c",
                  "until nc -z trillian-mysql 3306; do echo waiting for mysql; sleep 2; done;",
                ]

  - apiVersion: v1
    kind: Service
    metadata:
      name: trillian-log-server
      namespace: ssi-network
    spec:
      selector:
        app: trillian-log-server
      ports:
        - name: http
          port: 8090
        - name: rpc
          port: 8091

  # 6.4 Trillian Log Signer
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: trillian-log-signer
      namespace: ssi-network
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: trillian-log-signer
      template:
        metadata:
          labels:
            app: trillian-log-signer
        spec:
          containers:
            - name: log-signer
              image: ghcr.io/sigstore/rekor/trillian_log_signer:v1.3.4
              command:
                - "/ko-app/trillian_log_signer"
                - "--http_endpoint=0.0.0.0:8090"
                - "--rpc_endpoint=0.0.0.0:8091"
                - "--storage_system=mysql"
                - "--mysql_uri=root:rootpass@tcp(trillian-mysql:3306)/test"
                - "--sequencer_interval=1s"
                - "--batch_size=1000" # Batch size ditingkatkan untuk throughput tinggi
                - "--alsologtostderr"
                - "--force_master"
              ports:
                - containerPort: 8090
                - containerPort: 8091
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "2"
                  memory: "2Gi"
          initContainers:
            - name: wait-for-mysql
              image: mirror.gcr.io/busybox:1.36.1
              imagePullPolicy: IfNotPresent
              command:
                [
                  "sh",
                  "-c",
                  "until nc -z trillian-mysql 3306; do echo waiting for mysql; sleep 2; done;",
                ]

  - apiVersion: v1
    kind: Service
    metadata:
      name: trillian-log-signer
      namespace: ssi-network
    spec:
      selector:
        app: trillian-log-signer
      ports:
        - name: http
          port: 8090
        - name: rpc
          port: 8091

  # Rekor/Record Server (Public API - This is what Gateway talks to)
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: rekor-server
      namespace: ssi-network
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: rekor-server
      template:
        metadata:
          labels:
            app: rekor-server
        spec:
          enableServiceLinks: false
          containers:
            - name: rekor-server
              image: gcr.io/projectsigstore/rekor-server:v1.3.0
              command: ["rekor-server", "serve"]
              args:
                - "--trillian_log_server.address=trillian-log-server:8091"
                - "--trillian_log_server.tlog_id=6863132224160156518"
                - "--log_type=dev"
              ports:
                - containerPort: 3000
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "2"
                  memory: "2Gi"
          initContainers:
            - name: wait-for-trillian
              image: mirror.gcr.io/busybox:1.36.1
              imagePullPolicy: IfNotPresent
              command:
                [
                  "sh",
                  "-c",
                  "until nc -z trillian-log-server 8091; do echo waiting for trillian; sleep 2; done;",
                ]

  - apiVersion: v1
    kind: Service
    metadata:
      name: rekor-server
      namespace: ssi-network
    spec:
      selector:
        app: rekor-server
      ports:
        - port: 3000
          name: http-api

  # --- ISSUER AGENT ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: issuer-agent
      namespace: ssi-network
    spec:
      replicas: 2 # change it to 2
      selector:
        matchLabels:
          app: issuer-agent
      template:
        metadata:
          labels:
            app: issuer-agent
        spec:
          containers:
            - name: aca-py
              image: bcgovimages/aries-cloudagent:py3.12_1.0.0
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "2"
                  memory: "1Gi"
              ports:
                - containerPort: 8000
                - containerPort: 8001
              command: ["aca-py", "start"]
              # for production  use --genesis-url https://raw.githubusercontent.com/sovrin-foundation/sovrin/master/sovrin/pool_transactions_builder_genesis
              args:
                - "--label"
                - "Government Issuer"
                - "--inbound-transport"
                - "http"
                - "0.0.0.0"
                - "8000"
                - "--outbound-transport"
                - "http"
                - "--endpoint"
                - "http://issuer-agent.ssi-network.svc.cluster.local:8000"
                - "--admin"
                - "0.0.0.0"
                - "8001"
                - "--admin-insecure-mode"
                - "--wallet-type"
                - "askar"
                - "--wallet-name"
                - "issuer_wallet"
                - "--wallet-key"
                - "$(WALLET_KEY)"
                - "--wallet-storage-type"
                - "postgres"
                - "--wallet-storage-config"
                - '{"url":"wallet-db:5432","max_connections":50}'
                - "--wallet-storage-creds"
                - "$(WALLET_CREDS)"
                - "--genesis-url"
                - "http://von-webserver:8000/genesis"
                - "--auto-provision"
                - "--auto-accept-invites"
                - "--auto-accept-requests"
                - "--auto-ping-connection"
                - "--auto-respond-credential-request"
                - "--auto-respond-presentation-request"
                - "--auto-respond-presentation-proposal"
                - "--log-level"
                - "debug"
                - "--webhook-url"
                - "http://host.docker.internal:8888/webhooks"
              env:
                - name: WALLET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: WALLET_KEY
                - name: WALLET_CREDS
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: WALLET_CREDS

              readinessProbe:
                httpGet:
                  path: /status
                  port: 8001
                initialDelaySeconds: 20
                periodSeconds: 10
              livenessProbe:
                httpGet:
                  path: /status
                  port: 8001
                initialDelaySeconds: 60
                periodSeconds: 20


  - apiVersion: v1
    kind: Service
    metadata:
      name: issuer-agent
      namespace: ssi-network
    spec:
      selector:
        app: issuer-agent
      ports:
        - port: 8000
          name: http
        - port: 8001
          name: admin

  # --- HOLDER AGENT (For E2E Testing) ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: holder-agent
      namespace: ssi-network
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: holder-agent
      template:
        metadata:
          labels:
            app: holder-agent
        spec:
          containers:
            - name: aca-py
              image: bcgovimages/aries-cloudagent:py3.12_1.0.0
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "2"
                  memory: "1Gi"
              ports:
                - containerPort: 8030
                - containerPort: 8031
              command: ["aca-py", "start"]
              args:
                - "--label"
                - "Mobile Wallet (Holder)"
                - "--inbound-transport"
                - "http"
                - "0.0.0.0"
                - "8030"
                - "--outbound-transport"
                - "http"
                - "--endpoint"
                - "http://holder-agent.ssi-network.svc.cluster.local:8030"
                - "--admin"
                - "0.0.0.0"
                - "8031"
                - "--admin-insecure-mode"
                - "--wallet-type"
                - "askar"
                - "--wallet-name"
                - "holder_wallet_temp"
                - "--wallet-key"
                - "holder_key"
                - "--genesis-url"
                - "http://von-webserver:8000/genesis"
                - "--auto-provision"
                - "--auto-accept-invites"
                - "--auto-accept-requests"
                - "--auto-ping-connection"
                - "--auto-store-credential"
                - "--log-level"
                - "debug"
              readinessProbe:
                httpGet:
                  path: /status
                  port: 8031
                initialDelaySeconds: 20
                periodSeconds: 10

  - apiVersion: v1
    kind: Service
    metadata:
      name: holder-agent
      namespace: ssi-network
    spec:
      selector:
        app: holder-agent
      ports:
        - port: 8030
          name: http
        - port: 8031
          name: admin

  # --- GOVERNANCE SERVICE ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: governance-service
      namespace: ssi-network
    spec:
      replicas: 3 # change it to minimum of 3
      selector:
        matchLabels:
          app: governance-service
      template:
        metadata:
          labels:
            app: governance-service
        spec:
          containers:
            - name: governance-logic
              image: dn06/ssi:governance-service-v2
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              env:
                - name: ISSUER_ADMIN_URL
                  value: "http://issuer-agent:8001"
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: REDIS_PASSWORD
                - name: REDIS_URL
                  value: "redis://redis-store:6379"
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: JWT_SECRET
                - name: VALIDATOR_KEYS_PATH
                  value: "/etc/governance/keys"
              ports: [{ containerPort: 3000 }]
              volumeMounts:
                - name: keys-volume
                  mountPath: /etc/governance/keys
                  readOnly: true
              livenessProbe:
                httpGet:
                  path: /health
                  port: 3000
                initialDelaySeconds: 10
                periodSeconds: 10
          imagePullSecrets:
            - name: dockerhub-secret
          volumes:
            - name: keys-volume
              configMap:
                name: validator-keys

  - apiVersion: v1
    kind: Service
    metadata:
      name: governance-service
      namespace: ssi-network
    spec:
      selector:
        app: governance-service
      ports: [{ port: 3000 }]

  # --- VERIFICATION GATEWAY ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: verification-gateway
      namespace: ssi-network
    spec:
      replicas: 3 
      selector:
        matchLabels:
          app: verification-gateway
      template:
        metadata:
          labels:
            app: verification-gateway
        spec:
          containers:
            - name: gateway-middleware
              image: dn06/ssi:gateway-middleware-v4
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              env:
                - name: AGENT_ADMIN_URL
                  value: "http://127.0.0.1:8021"
                - name: TRILLIAN_LOG_URL
                  value: "http://rekor-server:3000"
                - name: ACCUMULATOR_URL
                  value: "http://accumulator-service:8080"
                - name: GOVERNANCE_URL
                  value: "http://governance-service:3000"
                - name: VG_THRESHOLD
                  value: "3"
                - name: NODE_ID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: REDIS_PASSWORD
                - name: REDIS_URL
                  value: "redis://redis-store:6379"
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: JWT_SECRET
                - name: WEBHOOK_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: WEBHOOK_SECRET
                - name: API_KEYS
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: API_KEYS
              ports:
                - containerPort: 4000

            - name: verifier-agent
              image: bcgovimages/aries-cloudagent:py3.12_1.0.0
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "1"
                  memory: "2Gi"
              ports:
                - containerPort: 8020
                - containerPort: 8021
              command: ["aca-py", "start"]
              # FIX: Using direct genesis URL consistent with Issuer
              # for production use --genesis-url https://raw.githubusercontent.com/sovrin-foundation/sovrin/master/sovrin/pool_transactions_builder_genesis
              # for sandbox use --genesis-url https://raw.githubusercontent.com/sovrin-foundation/sovrin/stable/sovrin/pool_transactions_sandbox_genesis
              args:
                - "--label"
                - "Verification Gateway"
                - "--inbound-transport"
                - "http"
                - "0.0.0.0"
                - "8020"
                - "--outbound-transport"
                - "http"
                - "--endpoint"
                - "http://verification-gateway.ssi-network.svc.cluster.local:8020"
                - "--admin"
                - "0.0.0.0"
                - "8021"
                - "--admin-insecure-mode"
                - "--wallet-type"
                - "askar"
                - "--wallet-name"
                - "verifier_wallet"
                - "--wallet-key"
                - "$(WALLET_KEY)"
                - "--wallet-storage-type"
                - "postgres"
                - "--wallet-storage-config"
                - '{"url":"wallet-db:5432","max_connections":50}'
                - "--wallet-storage-creds"
                - "$(WALLET_CREDS)"
                - "--genesis-url"
                - "http://von-webserver:8000/genesis"
                - "--auto-provision"
                - "--auto-accept-invites"
                - "--auto-accept-requests"
                - "--auto-ping-connection"
                - "--auto-respond-presentation-request"
                - "--auto-verify-presentation"
                - "--preserve-exchange-records"
                - "--webhook-url"
                - "http://host.docker.internal:8888/webhooks"
                - "--log-level"
                - "debug"
              env:
                - name: WALLET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: WALLET_KEY
                - name: WALLET_CREDS
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: WALLET_CREDS

              readinessProbe:
                httpGet:
                  path: /status
                  port: 8021
                initialDelaySeconds: 20
                periodSeconds: 10
              livenessProbe:
                httpGet:
                  path: /status
                  port: 8021
                initialDelaySeconds: 60
                periodSeconds: 20

          imagePullSecrets:
            - name: dockerhub-secret

  - apiVersion: v1
    kind: Service
    metadata:
      name: verification-gateway
      namespace: ssi-network
    spec:
      selector:
        app: verification-gateway
      ports:
        - port: 4000
          name: api
        - port: 8020
          name: verifier-http
        - port: 8021
          name: verifier-admin

  # --- 10. INGRESS (NGINX) ---
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: ssi-ingress
      namespace: ssi-network
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "1m"
        nginx.ingress.kubernetes.io/rewrite-target: /$2
        # Enforce HTTPS
        # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        # Enable CORS if a browser frontend calls this API
        nginx.ingress.kubernetes.io/enable-cors: "true"
        # TODO: need to reveiw this
        nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, OPTIONS"
    spec:
      ingressClassName: nginx
      rules:
        - http:
            paths:
              - path: /api/vg(/|$)(.*)
                pathType: Prefix
                backend:
                  service:
                    name: verification-gateway
                    port:
                      number: 4000
              - path: /api/gov(/|$)(.*)
                pathType: Prefix
                backend:
                  service:
                    name: governance-service
                    port:
                      number: 3000

  # ─────────────────────────────────────────────────────────────────────────
  # VON NETWORK — 4-Node Indy Ledger Cluster
  # ─────────────────────────────────────────────────────────────────────────

  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-von-network
      namespace: ssi-network
    spec:
      podSelector:
        matchLabels:
          network: von
      policyTypes: [Ingress]
      ingress:
        - from:
            - podSelector: { matchLabels: { network: von } }
            - podSelector: { matchLabels: { app: issuer-agent } }
            - podSelector: { matchLabels: { app: holder-agent } }
            - podSelector: { matchLabels: { app: verification-gateway } }
          ports:
            - { port: 8000 }
            - { port: 9701 }
            - { port: 9702 }
            - { port: 9703 }
            - { port: 9704 }
            - { port: 9705 }
            - { port: 9706 }
            - { port: 9707 }
            - { port: 9708 }

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: von-node-1
      namespace: ssi-network
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: von-node-1
      template:
        metadata:
          labels:
            app: von-node-1
            network: von
        spec:
          containers:
            - name: node
              image: dn06/ssi:von-network-v1
              imagePullPolicy: IfNotPresent
              command: ["bash", "-c", "./scripts/start_node.sh 1"]
              env:
                - name: IP
                  value: "0.0.0.0"
                - name: IPS
                  value: "von-node-1,von-node-2,von-node-3,von-node-4"
                - name: RUST_LOG
                  value: "warning"
              ports:
                - containerPort: 9701
                - containerPort: 9702
              resources:
                requests: { cpu: "50m", memory: "128Mi" }
                limits:   { cpu: "250m", memory: "256Mi" }
              volumeMounts:
                - name: ledger-data
                  mountPath: /home/indy/ledger
          imagePullSecrets:
            - name: dockerhub-secret
          volumes:
            - name: ledger-data
              emptyDir: {}

  - apiVersion: v1
    kind: Service
    metadata: { name: von-node-1, namespace: ssi-network }
    spec:
      selector: { app: von-node-1 }
      ports:
        - { port: 9701, name: client }
        - { port: 9702, name: node }

