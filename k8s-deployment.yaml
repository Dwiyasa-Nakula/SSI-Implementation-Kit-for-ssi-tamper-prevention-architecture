apiVersion: v1
kind: List
items:
  # --- NAMESPACE ---
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: ssi-network

  # --- SECRETS ---
  - apiVersion: v1
    kind: Secret
    metadata:
      name: ssi-secrets
      namespace: ssi-network
    type: Opaque
    stringData:
      JWT_SECRET: "super_secure_production_secret_key_123"
      API_KEYS: "trusted-rp-key-001,trusted-rp-key-002"
      WALLET_KEY: "secure_wallet_key_abc123"
      WALLET_CREDS: '{"account":"indy","password":"secure_password","admin_account":"indy","admin_password":"secure_password"}'
      POSTGRES_PASSWORD: "secure_db_password"

  # --- NETWORK POLICIES ---
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-dns
      namespace: ssi-network
    spec:
      podSelector: {}
      policyTypes:
        - Egress
      egress:
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kube-system
          ports:
            - protocol: UDP
              port: 53
            - protocol: TCP
              port: 53

  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-internal-traffic
      namespace: ssi-network
    spec:
      podSelector: {}
      policyTypes:
        - Ingress
      ingress:
        - from:
            - podSelector: {}

  # --- REDIS STORE ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: redis-store
      namespace: ssi-network
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: redis-store
      template:
        metadata:
          labels:
            app: redis-store
        spec:
          containers:
            - name: redis
              image: redis:7.2-alpine
              imagePullPolicy: IfNotPresent # Gunakan image lokal jika ada (untuk mempercepat)
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              ports: [{ containerPort: 6379 }]

  - apiVersion: v1
    kind: Service
    metadata:
      name: redis-store
      namespace: ssi-network
    spec:
      selector:
        app: redis-store
      ports: [{ port: 6379 }]

  # --- POSTGRES ---
  - apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: wallet-db
      namespace: ssi-network
    spec:
      serviceName: wallet-db
      replicas: 1
      selector:
        matchLabels:
          app: wallet-db
      template:
        metadata:
          labels:
            app: wallet-db
        spec:
          containers:
            - name: postgres
              image: postgres:15.4-alpine
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              imagePullPolicy: IfNotPresent
              env:
                - name: POSTGRES_USER
                  value: "indy"
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_DB
                  value: "wallets"
              ports:
                - containerPort: 5432
              volumeMounts:
                - name: db-data
                  mountPath: /var/lib/postgresql/data
      volumeClaimTemplates:
        - metadata:
            name: db-data
          spec:
            storageClassName: hostpath
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi

  - apiVersion: v1
    kind: Service
    metadata:
      name: wallet-db
      namespace: ssi-network
    spec:
      clusterIP: None
      selector:
        app: wallet-db
      ports:
        - port: 5432

  # --- TRANSPARENCY LOG ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: trillian-log-server
      namespace: ssi-network
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: trillian-log-server
      template:
        metadata:
          labels:
            app: trillian-log-server
        spec:
          containers:
            - name: log-server
              image: dn06/ssi:transparency-log-v1
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              env:
                - name: REDIS_URL
                  value: "redis://redis-store:6379"
              ports:
                - containerPort: 3000
          imagePullSecrets:
            - name: dockerhub-secret

  - apiVersion: v1
    kind: Service
    metadata:
      name: trillian-log-server
      namespace: ssi-network
    spec:
      selector:
        app: trillian-log-server
      ports: [{ port: 3000 }]

  # --- ISSUER AGENT ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: issuer-agent
      namespace: ssi-network
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: issuer-agent
      template:
        metadata:
          labels:
            app: issuer-agent
        spec:
          containers:
            - name: aca-py
              image: bcgovimages/aries-cloudagent:py3.12_1.0.0
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              volumeMounts:
                - name: genesis-file
                  mountPath: /etc/indy/genesis.txn
                  subPath: genesis.txn
              ports:
                - containerPort: 8000
                - containerPort: 8001
              command: ["/bin/bash", "-c"]
              args:
                - >-
                  aca-py start
                  --label "Government Issuer"
                  --inbound-transport http 0.0.0.0 8000
                  --outbound-transport http
                  --admin 0.0.0.0 8001
                  --admin-insecure-mode
                  --wallet-type indy
                  --wallet-name issuer_wallet
                  --wallet-key $WALLET_KEY
                  --wallet-storage-type postgres_storage_config
                  --wallet-storage-config '{"url":"wallet-db:5432","max_connections":5}'
                  --wallet-storage-creds $WALLET_CREDS
                  --genesis-file /etc/indy/genesis.txn
                  --auto-provision
              env:
                - name: WALLET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: WALLET_KEY
                - name: WALLET_CREDS
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: WALLET_CREDS
              readinessProbe:
                httpGet:
                  path: /status
                  port: 8001
                initialDelaySeconds: 20
                periodSeconds: 10
              livenessProbe:
                httpGet:
                  path: /status
                  port: 8001
                initialDelaySeconds: 60
                periodSeconds: 20
          volumes:
            - name: genesis-file
              configMap:
                name: genesis-config

  - apiVersion: v1
    kind: Service
    metadata:
      name: issuer-agent
      namespace: ssi-network
    spec:
      selector:
        app: issuer-agent
      ports:
        - port: 8000
          name: http
        - port: 8001
          name: admin

  # --- GOVERNANCE SERVICE ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: governance-service
      namespace: ssi-network
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: governance-service
      template:
        metadata:
          labels:
            app: governance-service
        spec:
          containers:
            - name: governance-logic
              image: dn06/ssi:governance-service-v1
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              env:
                - name: ISSUER_ADMIN_URL
                  value: "http://issuer-agent:8001"
                - name: REDIS_URL
                  value: "redis://redis-store:6379"
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: JWT_SECRET
              ports: [{ containerPort: 3000 }]
              livenessProbe:
                httpGet:
                  path: /health
                  port: 3000
                initialDelaySeconds: 10
                periodSeconds: 10
          imagePullSecrets:
            - name: dockerhub-secret

  - apiVersion: v1
    kind: Service
    metadata:
      name: governance-service
      namespace: ssi-network
    spec:
      selector:
        app: governance-service
      ports: [{ port: 3000 }]

  # --- VERIFICATION GATEWAY ---
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: verification-gateway
      namespace: ssi-network
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: verification-gateway
      template:
        metadata:
          labels:
            app: verification-gateway
        spec:
          containers:
            - name: gateway-middleware
              image: dn06/ssi:gateway-middleware-v1
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              env:
                - name: AGENT_ADMIN_URL
                  value: "http://127.0.0.1:8021"
                - name: TRILLIAN_LOG_URL
                  value: "http://trillian-log-server:3000"
                - name: REDIS_URL
                  value: "redis://redis-store:6379"
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: JWT_SECRET
                - name: API_KEYS
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: API_KEYS
              ports:
                - containerPort: 4000

            - name: verifier-agent
              image: bcgovimages/aries-cloudagent:py3.12_1.0.0
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "200m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              ports:
                - containerPort: 8020
                - containerPort: 8021
              command: ["/bin/bash", "-c"]
              args:
                - >-
                  aca-py start 
                  --label "Verification Gateway" 
                  --inbound-transport http 0.0.0.0 8020 
                  --outbound-transport http 
                  --admin 0.0.0.0 8021 
                  --admin-insecure-mode 
                  --wallet-type indy 
                  --wallet-name verifier_wallet 
                  --wallet-key $WALLET_KEY 
                  --wallet-storage-type postgres_storage_config 
                  --wallet-storage-config '{"url":"wallet-db:5432","max_connections":5}' 
                  --wallet-storage-creds $WALLET_CREDS 
                  --genesis-url http://greenlight.bcovrin.vonx.io/genesis 
                  --auto-provision
              env:
                - name: WALLET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: WALLET_KEY
                - name: WALLET_CREDS
                  valueFrom:
                    secretKeyRef:
                      name: ssi-secrets
                      key: WALLET_CREDS

          imagePullSecrets:
            - name: dockerhub-secret

  - apiVersion: v1
    kind: Service
    metadata:
      name: verification-gateway
      namespace: ssi-network
    spec:
      selector:
        app: verification-gateway
      ports: [{ port: 4000 }]
